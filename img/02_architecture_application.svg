<svg viewBox="0 0 1320 1170" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">OncoCollab — Architecture applicative</title>
  <desc id="d">Architecture complète d'OncoCollab en quatre couches : Client, Application, IA et Données, avec les flux principaux et la chaîne RAG.</desc>
